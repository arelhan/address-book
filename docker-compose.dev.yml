services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi &&
             npx prisma generate &&
             npx prisma db push &&
             npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:4000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev"

volumes:
  backend-node-modules:
  frontend-node-modules:
