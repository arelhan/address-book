version: '3.8'

services:
  backend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    command: >
      sh -c "apt-get update && apt-get install -y openssl &&
             npm install &&
             npx prisma generate &&
             npx prisma db push &&
             npm run dev"

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install && npm run dev"

volumes:
  backend-node-modules:
  frontend-node-modules:
