services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    expose:
      - "4000"
    environment:
      - DATABASE_URL=file:/data/dev.db
      - PORT=4000
      - CORS_ORIGIN=*
    volumes:
      - backend-db:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      - SERVICE_FQDN_FRONTEND_3000
      - BACKEND_URL=http://backend:4000
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  backend-db:
